<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ResearchNexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <span class="logo-icon">→</span> ResearchNexus
            </div>
            <h2 id="form-title">Sign in to your account</h2>
            <p id="form-subtitle">Welcome back to the collaborative research platform.</p>
            
            <form id="auth-form">
                <div id="register-fields" style="display: none;">
                    <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                        <div class="input-group" style="margin-bottom: 0;">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" placeholder="John">
                        </div>
                        <div class="input-group" style="margin-bottom: 0;">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" placeholder="Doe">
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div id="error-message" class="error-message"></div>
                <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
            </form>
            
            <div style="margin-top: 24px; text-align: center; font-size: 14px;">
                <a href="#" id="toggle-mode" style="color: var(--accent-green); text-decoration: none;">Don't have an account? Sign Up</a>
            </div>
            
            <div class="login-footer">
                Demo Credentials: neha@nexus.edu / password123 (Admin)<br>
                Or any other user from your database.
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        
        document.getElementById('toggle-mode').addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            
            document.getElementById('form-title').textContent = isLoginMode ? 'Sign in to your account' : 'Create your account';
            document.getElementById('form-subtitle').textContent = isLoginMode ? 'Welcome back to the collaborative research platform.' : 'Join the research network today.';
            document.getElementById('submit-btn').textContent = isLoginMode ? 'Sign In' : 'Sign Up';
            document.getElementById('toggle-mode').textContent = isLoginMode ? "Don't have an account? Sign Up" : 'Already have an account? Sign In';
            
            const regFields = document.getElementById('register-fields');
            regFields.style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('first-name').required = !isLoginMode;
            document.getElementById('last-name').required = !isLoginMode;
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('first-name').value;
            const lastName = document.getElementById('last-name').value;
            const errorMsg = document.getElementById('error-message');
            
            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            const payload = isLoginMode ? { email, password } : { firstName, lastName, email, password };
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    window.location.href = '/index.html';
                } else {
                    errorMsg.textContent = data.error || 'Authentication failed';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again.';
            }
        });
    </script>
</body>
</html>
